        };

        // --- INTERPRETATION ENGINE ---
        const getInterpretation = (type, rawScore) => {
          let scoreText = String(rawScore);
          let risk = 'Result Scored';
          let implication = 'Assessment completed.';
          const s = parseFloat(rawScore);

          if (type !== 'Infant Neurological International Battery (INFANIB)' && isNaN(s)) return null;

          switch(type) {
            case 'Berg Balance Scale (BBS)':
              scoreText = `${s}/56`;
              if (s >= 41) { risk = 'Low Fall Risk'; implication = 'Independent balance with minimal fall risk. (Ref: Berg K, et al. (1989))'; }
              else if (s >= 21) { risk = 'Moderate Fall Risk'; implication = 'Balance impairment requiring supervision or intervention. (Ref: Berg K, et al. (1989))'; }
              else { risk = 'High Fall Risk'; implication = 'Significant balance impairment with high fall risk. (Ref: Berg K, et al. (1989))'; }
              break;
            case 'Timed Up and Go Test (TUG)':
              scoreText = `${s} s`;
              if (s < 10) { risk = 'Normal Mobility'; implication = 'Independent functional mobility. (Ref: Podsiadlo & Richardson (1991))'; }
              else if (s <= 19) { risk = 'Mild Mobility Limitation'; implication = 'Independent but slower mobility. (Ref: Podsiadlo & Richardson (1991))'; }
              else if (s <= 29) { risk = 'Moderate Mobility Limitation'; implication = 'Mobility impairment requiring supervision. (Ref: Podsiadlo & Richardson (1991))'; }
              else { risk = 'Severe Mobility Limitation'; implication = 'Significant mobility impairment and increased fall risk. (Ref: Podsiadlo & Richardson (1991))'; }
              break;
            case '10 Metre Walk Test':
              const speed = 10 / s; scoreText = `${speed.toFixed(2)} m/s`;
              if (speed > 1.2) { risk = 'Normal Ambulator'; implication = 'Normal walking speed with independent community mobility. (Ref: Perry J, et al. (1995))'; }
              else if (speed >= 0.8) { risk = 'Community Ambulator'; implication = 'Independent community ambulation but walking speed may be reduced. (Ref: Perry et al., 1995)'; }
              else if (speed >= 0.4) { risk = 'Limited Community Ambulator'; implication = 'Able to ambulate within limited community environments; may require assistance for longer distances. (Ref: Perry et al., 1995)'; }
              else { risk = 'Household Ambulator'; implication = 'Walking ability is generally limited to household environments. (Ref: Perry et al., 1995)'; }
              break;
            case 'Functional Reach Test':
              scoreText = `${s} cm`;
              if (s > 25) { risk = 'Low Fall Risk'; implication = 'Normal dynamic balance with low risk of falls. (Ref: Duncan PW, et al. (1990))'; }
              else if (s >= 15) { risk = 'Moderate Fall Risk'; implication = 'Reduced dynamic balance; increased risk of falls. (Ref: Duncan et al., 1990)'; }
              else { risk = 'High Fall Risk'; implication = 'Significant balance impairment associated with a high risk of falls. (Ref: Duncan et al., 1990)'; }
              break;
            case 'Fugl-Meyer Assessment (Upper Limb)':
              scoreText = `${s}/66`;
              if (s >= 53) { risk = 'Mild Motor Impairment'; implication = 'Good upper limb motor recovery with minimal functional limitation. (Ref: Fugl-Meyer AR, et al. (1975))'; }
              else if (s >= 23) { risk = 'Moderate Motor Impairment'; implication = 'Moderate impairment with reduced voluntary motor control and functional performance. (Ref: Fugl-Meyer et al., 1975)'; }
              else { risk = 'Severe Motor Impairment'; implication = 'Severe motor impairment with poor voluntary movement and significant dependence. (Ref: Fugl-Meyer et al., 1975)'; }
              break;
            case 'Motor Assessment Scale (MAS)':
              scoreText = `${s}/54`;
              if (s >= 37) { risk = 'Mild Functional Impairment'; implication = 'Good functional recovery with minimal assistance required during motor tasks. (Ref: Carr JH, et al. (1985))'; }
              else if (s >= 19) { risk = 'Moderate Functional Impairment'; implication = 'Moderate motor deficits affecting functional activities and mobility. (Ref: Carr et al., 1985)'; }
              else { risk = 'Severe Functional Impairment'; implication = 'Severe functional limitation requiring substantial assistance. (Ref: Carr et al., 1985)'; }
              break;
            case 'NIH Stroke Scale':
              scoreText = `${s}/42`;
              if (s >= 21) { risk = 'Severe Stroke'; implication = 'Severe neurological impairment associated with poor functional outcome. (Ref: Brott et al., 1989)'; }
              else if (s >= 16) { risk = 'Moderate to Severe Stroke'; implication = 'Significant neurological deficit with considerable functional impairment. (Ref: Brott et al., 1989)'; }
              else if (s >= 5) { risk = 'Moderate Stroke'; implication = 'Moderate neurological impairment requiring rehabilitation. (Ref: Brott et al., 1989)'; }
              else if (s >= 1) { risk = 'Minor Stroke'; implication = 'Mild neurological deficit with minimal functional impairment. (Ref: Brott et al., 1989)'; }
              else { risk = 'No Stroke Symptoms'; implication = 'No measurable neurological deficit. (Ref: Brott T, et al. (1989))'; }
              break;
            case 'Montreal Cognitive Assessment (MoCA)':
              scoreText = `${s}/30`;
              if (s >= 26) { risk = 'Normal Cognition'; implication = 'Normal cognitive function. (Ref: Nasreddine ZS, et al. (2005))'; }
              else if (s >= 18) { risk = 'Mild Cognitive Impairment'; implication = 'Mild deficits in memory, attention, executive or visuospatial function. (Ref: Nasreddine et al., 2005; validation studies)'; }
              else if (s >= 10) { risk = 'Moderate Cognitive Impairment'; implication = 'Moderate cognitive impairment affecting daily functioning. (Ref: Validation studies)'; }
              else { risk = 'Severe Cognitive Impairment'; implication = 'Severe global cognitive impairment. (Ref: Validation studies)'; }
              break;
            case 'Trunk Control Test (TCT)':
              scoreText = `${s}/100`;
              if (s === 100) { risk = 'Normal Trunk Control'; implication = 'Excellent trunk stability and good prognosis for functional mobility. (Ref: Collin & Wade, 1990)'; }
              else if (s >= 75) { risk = 'Mild Trunk Impairment'; implication = 'Mild trunk instability with minimal functional limitation. (Ref: Collin & Wade, 1990)'; }
              else if (s >= 50) { risk = 'Moderate Trunk Impairment'; implication = 'Moderate impairment affecting transfers, sitting balance and mobility. (Ref: Collin & Wade, 1990)'; }
              else { risk = 'Severe Trunk Impairment'; implication = 'Severe trunk dysfunction requiring substantial assistance. (Ref: Collin & Wade, 1990)'; }
              break;
            case 'Spinal Cord Independence Measure (SCIM)':
              scoreText = `${s}/100`;
              if (s >= 76) { risk = 'High Independence'; implication = 'Higher score indicates greater functional independence. (Ref: Catz A, et al. 1997)'; }
              else if (s >= 51) { risk = 'Moderate Independence'; implication = 'Moderate functional independence. (Ref: Catz A, et al. 1997)'; }
              else if (s >= 26) { risk = 'Severe Dependence'; implication = 'Significant dependence affecting mobility and ADLs. (Ref: Catz A, et al. 1997)'; }
              else { risk = 'Total Dependence'; implication = 'Marked functional dependence. (Ref: Catz A, et al. 1997)'; }
              break;
            case 'Tinetti Test':
              scoreText = `${s}/28`;
              if (s >= 25) { risk = 'Low Fall Risk'; implication = 'Good balance and gait performance with minimal risk of falling. Independent mobility is generally safe. (Ref: Tinetti ME. 1986)'; }
              else if (s >= 19) { risk = 'Moderate Fall Risk'; implication = 'Mild to moderate impairment in balance and gait. Increased likelihood of falls; balance training and supervision are recommended. (Ref: Tinetti ME. 1986)'; }
              else { risk = 'High Fall Risk'; implication = 'Significant impairment in balance and gait associated with a high risk of falls. Comprehensive fall prevention and rehabilitation are recommended. (Ref: Tinetti ME. 1986)'; }
              break;
            case 'Numeric Pain Rating Scale (NPRS)':
              scoreText = `${s}/10`;
              if (s >= 7) { risk = 'Severe Pain'; implication = 'Severe pain with significant functional limitation. (Ref: Farrar JT, et al. (2001))'; }
              else if (s >= 4) { risk = 'Moderate Pain'; implication = 'Moderate pain affecting function and daily activities. (Ref: Farrar JT, et al. (2001))'; }
              else if (s >= 1) { risk = 'Mild Pain'; implication = 'Mild pain with minimal interference in daily activities. (Ref: Farrar JT, et al. (2001))'; }
              else { risk = 'No Pain'; implication = 'No pain reported. (Ref: Farrar JT, et al. (2001))'; }
              break;
            case 'Oswestry Disability Index (ODI)':
              scoreText = `${s}%`;
              if (s >= 81) { risk = 'Bed-bound or Exaggerating Symptoms'; implication = 'Patient is either bed-bound or symptom reporting should be interpreted carefully. (Ref: Fairbank JCT, Pynsent PB. (2000))'; }
              else if (s >= 61) { risk = 'Crippled'; implication = 'Daily activities are significantly affected. Comprehensive assessment and intervention are recommended. (Ref: Fairbank JCT, Pynsent PB. (2000))'; }
              else if (s >= 41) { risk = 'Severe Disability'; implication = 'Pain remains the main problem affecting activities of daily living. Detailed assessment and treatment are required. (Ref: Fairbank JCT, Pynsent PB. (2000))'; }
              else if (s >= 21) { risk = 'Moderate Disability'; implication = 'Difficulty with sitting, lifting and standing. Conservative management is usually indicated. (Ref: Fairbank JCT, Pynsent PB. (2000))'; }
              else { risk = 'Minimal Disability'; implication = 'Able to cope with most daily activities. Usually no treatment required except advice on lifting, sitting and exercise. (Ref: Fairbank JCT, Pynsent PB. (2000))'; }
              break;
            case 'Neck Disability Index (NDI)':
              scoreText = `${s}%`;
              if (s >= 70) { risk = 'Complete Disability'; implication = 'Severe limitation with inability to perform many daily activities independently. (Ref: Vernon H, Mior S. (1991))'; }
              else if (s >= 50) { risk = 'Severe Disability'; implication = 'Significant neck-related disability requiring comprehensive rehabilitation. (Ref: Vernon H, Mior S. (1991))'; }
              else if (s >= 30) { risk = 'Moderate Disability'; implication = 'Moderate functional limitation affecting work and daily activities. (Ref: Vernon H, Mior S. (1991))'; }
              else if (s >= 10) { risk = 'Mild Disability'; implication = 'Mild limitation in daily activities due to neck pain. (Ref: Vernon H, Mior S. (1991))'; }
              else { risk = 'No Disability'; implication = 'No clinically significant neck-related disability. (Ref: Vernon H, Mior S. (1991))'; }
              break;
            case 'Patient Specific Functional Scale (PSFS)':
              scoreText = `${s}/10`;
              if (s === 10) { risk = 'No Functional Limitation'; implication = 'Able to perform activity at pre-injury level. (Ref: Stratford PW, et al. 1995)'; }
              else if (s >= 7) { risk = 'Mild Limitation'; implication = 'Minor difficulty performing activity. (Ref: Stratford PW, et al. 1995)'; }
              else if (s >= 4) { risk = 'Moderate Limitation'; implication = 'Moderate functional difficulty affecting daily activities. (Ref: Stratford PW, et al. 1995)'; }
              else if (s >= 1) { risk = 'Severe Limitation'; implication = 'Significant difficulty performing activity. (Ref: Stratford PW, et al. 1995)'; }
              else { risk = 'Unable to Perform'; implication = 'Unable to perform the selected activity. (Ref: Stratford PW, et al. 1995)'; }
              break;
            case 'Fear Avoidance Beliefs Questionnaire (FABQ)':
              const pa = parseInt(String(rawScore).split(',')[0]) || 0;
              const w = parseInt(String(rawScore).split(',')[1]) || 0;
              scoreText = `PA: ${pa}, Work: ${w}`;
              if (w >= 34 || pa >= 15) { risk = 'High Fear-Avoidance'; implication = 'Increased fear of physical activity and/or high risk of prolonged disability and delayed return to work. (Ref: Waddell G, et al. 1993)'; }
              else { risk = 'Low Fear-Avoidance'; implication = 'Low fear of movement during physical activity and lower psychosocial risk related to work. (Ref: Waddell G, et al. 1993)'; }
              break;
            case 'Western Ontario and McMaster Universities Osteoarthritis Index (WOMAC)':
              scoreText = `${s}/96`;
              if (s >= 73) { risk = 'Extreme Symptoms'; implication = 'Very severe osteoarthritis affecting daily function. (Ref: Bellamy N, et al. 1988)'; }
              else if (s >= 49) { risk = 'Severe Symptoms'; implication = 'Significant pain and disability. (Ref: Bellamy N, et al. 1988)'; }
              else if (s >= 25) { risk = 'Moderate Symptoms'; implication = 'Moderate osteoarthritis symptoms. (Ref: Bellamy N, et al. 1988)'; }
              else { risk = 'Mild Symptoms'; implication = 'Mild pain, stiffness and functional limitation. (Ref: Bellamy N, et al. 1988)'; }
              break;
            case 'Disabilities of the Arm, Shoulder and Hand (DASH)':
              scoreText = `${s}%`;
              if (s >= 81) { risk = 'Extreme Disability'; implication = 'Severe upper extremity disability. (Ref: Hudak PL, et al. 1996)'; }
              else if (s >= 61) { risk = 'Severe Disability'; implication = 'Significant limitation affecting daily activities. (Ref: Hudak PL, et al. 1996)'; }
              else if (s >= 41) { risk = 'Moderate Disability'; implication = 'Moderate functional impairment. (Ref: Hudak PL, et al. 1996)'; }
              else if (s >= 21) { risk = 'Mild Disability'; implication = 'Mild limitation in upper limb function. (Ref: Hudak PL, et al. 1996)'; }
              else { risk = 'Minimal Disability'; implication = 'Minimal upper limb disability. (Ref: Hudak PL, et al. 1996)'; }
              break;
            case 'Knee Injury and Osteoarthritis Outcome Score (KOOS)':
              scoreText = `${s}%`; // KOOS is conventionally an average across subscales here
              if (s >= 90) { risk = 'Excellent Function'; implication = 'Minimal symptoms and excellent knee function. (Ref: Roos EM, et al. 1998)'; }
              else if (s >= 70) { risk = 'Good Function'; implication = 'Mild symptoms with good functional ability. (Ref: Roos EM, et al. 1998)'; }
              else if (s >= 50) { risk = 'Fair Function'; implication = 'Moderate knee impairment. (Ref: Roos EM, et al. 1998)'; }
              else { risk = 'Poor Function'; implication = 'Significant symptoms and functional limitation. (Ref: Roos EM, et al. 1998)'; }
              break;
            case 'Six Minute Walk Test (6MWT)':
              scoreText = `${s} m`;
              if (s > 550) { risk = 'Excellent Functional Capacity'; implication = 'Excellent exercise tolerance. (Ref: ATS Committee. 2002)'; }
              else if (s >= 400) { risk = 'Good Functional Capacity'; implication = 'Mild limitation in functional endurance. (Ref: ATS Committee. 2002)'; }
              else if (s >= 300) { risk = 'Moderate Functional Limitation'; implication = 'Reduced exercise capacity affecting community mobility. (Ref: ATS Committee. 2002)'; }
              else { risk = 'Severe Functional Limitation'; implication = 'Markedly reduced exercise tolerance. (Ref: ATS Committee. 2002)'; }
              break;
            case 'Two Minute Walk Test (2MWT)':
              scoreText = `${s} m`;
              if (s > 200) { risk = 'Excellent Functional Capacity'; implication = 'Excellent walking endurance. (Ref: Brooks D, et al. 2001)'; }
              else if (s >= 150) { risk = 'Good Functional Capacity'; implication = 'Mild reduction in walking endurance. (Ref: Brooks D, et al. 2001)'; }
              else if (s >= 100) { risk = 'Moderate Functional Limitation'; implication = 'Moderate impairment in walking capacity. (Ref: Brooks D, et al. 2001)'; }
              else { risk = 'Severe Functional Limitation'; implication = 'Severe limitation in functional ambulation. (Ref: Brooks D, et al. 2001)'; }
              break;
            case 'Borg RPE (6-20 Category Scale)':
              scoreText = `${s}`;
              if (s >= 20) { risk = 'Maximal Exertion'; implication = 'Absolute maximum effort. (Ref: Borg GAV. 1982)'; }
              else if (s >= 19) { risk = 'Extremely Hard'; implication = 'Maximal effort. (Ref: Borg GAV. 1982)'; }
              else if (s >= 17) { risk = 'Very Hard'; implication = 'Near maximal effort. (Ref: Borg GAV. 1982)'; }
              else if (s >= 15) { risk = 'Hard'; implication = 'Vigorous exercise. (Ref: Borg GAV. 1982)'; }
              else if (s >= 13) { risk = 'Somewhat Hard'; implication = 'Moderate intensity exercise. (Ref: Borg GAV. 1982)'; }
              else if (s >= 11) { risk = 'Light'; implication = 'Sustainable exercise intensity. (Ref: Borg GAV. 1982)'; }
              else if (s >= 9) { risk = 'Very Light'; implication = 'Comfortable effort. (Ref: Borg GAV. 1982)'; }
              else if (s >= 7) { risk = 'Extremely Light'; implication = 'Very light activity. (Ref: Borg GAV. 1982)'; }
              else { risk = 'No Exertion'; implication = 'Rest. (Ref: Borg GAV. 1982)'; }
              break;
            case 'Borg RPE (0-10 CR Scale)':
              scoreText = `${s}`;
              if (s >= 10) { risk = 'Maximal'; implication = 'Maximum perceived effort. (Ref: Borg GAV. 1982)'; }
              else if (s >= 7) { risk = 'Very Severe'; implication = 'Very intense exertion. (Ref: Borg GAV. 1982)'; }
              else if (s >= 5) { risk = 'Severe'; implication = 'High exertion. (Ref: Borg GAV. 1982)'; }
              else if (s >= 4) { risk = 'Somewhat Severe'; implication = 'Moderately high effort. (Ref: Borg GAV. 1982)'; }
              else if (s >= 3) { risk = 'Moderate'; implication = 'Moderate effort. (Ref: Borg GAV. 1982)'; }
              else if (s >= 2) { risk = 'Slight'; implication = 'Mild exertion. (Ref: Borg GAV. 1982)'; }
              else if (s >= 1) { risk = 'Very Slight'; implication = 'Very mild symptoms. (Ref: Borg GAV. 1982)'; }
              else if (s > 0) { risk = 'Very Very Slight'; implication = 'Minimal effort. (Ref: Borg GAV. 1982)'; }
              else { risk = 'Nothing at All'; implication = 'No symptoms. (Ref: Borg GAV. 1982)'; }
              break;
            case 'Modified Borg Dyspnoea Scale':
              scoreText = `${s}`;
              if (s >= 10) { risk = 'Maximal'; implication = 'Maximum breathlessness. (Ref: Borg GAV. 1982)'; }
              else if (s >= 7) { risk = 'Very Severe'; implication = 'Very marked breathlessness. (Ref: Borg GAV. 1982)'; }
              else if (s >= 5) { risk = 'Severe'; implication = 'Significant breathlessness. (Ref: Borg GAV. 1982)'; }
              else if (s >= 4) { risk = 'Somewhat Severe'; implication = 'Increasing dyspnoea. (Ref: Borg GAV. 1982)'; }
              else if (s >= 3) { risk = 'Moderate'; implication = 'Moderate breathlessness. (Ref: Borg GAV. 1982)'; }
              else if (s >= 2) { risk = 'Slight'; implication = 'Mild breathlessness. (Ref: Borg GAV. 1982)'; }
              else if (s >= 1) { risk = 'Very Slight'; implication = 'Minimal dyspnoea. (Ref: Borg GAV. 1982)'; }
              else if (s > 0) { risk = 'Very Very Slight'; implication = 'Barely noticeable dyspnoea. (Ref: Borg GAV. 1982)'; }
              else { risk = 'Nothing at All'; implication = 'No breathlessness. (Ref: Borg GAV. 1982)'; }
              break;
            case 'mMRC Dyspnoea Scale':
              scoreText = `Grade ${s}`;
              if (s >= 4) { risk = 'Grade 4'; implication = 'Too breathless to leave the house or breathless during dressing. (Ref: Fletcher CM. 1960)'; }
              else if (s === 3) { risk = 'Grade 3'; implication = 'Stops after about 100 m or a few minutes walking. (Ref: Fletcher CM. 1960)'; }
              else if (s === 2) { risk = 'Grade 2'; implication = 'Walks slower than peers or stops when walking on level ground. (Ref: Fletcher CM. 1960)'; }
              else if (s === 1) { risk = 'Grade 1'; implication = 'Breathless when hurrying or walking uphill. (Ref: Fletcher CM. 1960)'; }
              else { risk = 'Grade 0'; implication = 'Breathless only with strenuous exercise. (Ref: Fletcher CM. 1960)'; }
              break;
            case 'Incremental Shuttle Walk Test (ISWT)':
              scoreText = `${s} m`;
              if (s > 500) { risk = 'Excellent Functional Capacity'; implication = 'Excellent cardiorespiratory fitness. (Ref: Singh SJ, et al. 1992)'; }
              else if (s >= 300) { risk = 'Good Functional Capacity'; implication = 'Mild limitation. (Ref: Singh SJ, et al. 1992)'; }
              else if (s >= 150) { risk = 'Moderate Functional Limitation'; implication = 'Moderate exercise limitation. (Ref: Singh SJ, et al. 1992)'; }
              else { risk = 'Severe Functional Limitation'; implication = 'Severe exercise intolerance. (Ref: Singh SJ, et al. 1992)'; }
              break;
            case 'Chelsea Critical Care Physical Assessment (CPAx)':
              scoreText = `${s}/50`;
              if (s >= 45) { risk = 'Mild Impairment'; implication = 'Near-independent physical function. (Ref: Corner EJ, et al. 2013)'; }
              else if (s >= 30) { risk = 'Moderate Impairment'; implication = 'Moderate ICU-acquired weakness. (Ref: Corner EJ, et al. 2013)'; }
              else if (s >= 15) { risk = 'Severe Impairment'; implication = 'Significant physical limitations. (Ref: Corner EJ, et al. 2013)'; }
              else { risk = 'Very Severe Impairment'; implication = 'Profound ICU-acquired weakness. (Ref: Corner EJ, et al. 2013)'; }
              break;
            case 'ICU Mobility Scale (IMS)':
              scoreText = `${s}/10`;
              if (s >= 10) { risk = 'Walking Independently'; implication = 'Full independent mobility. (Ref: Hodgson C, et al. 2014)'; }
              else if (s >= 9) { risk = 'Walking Independently with Gait Aid'; implication = 'Independent mobility using aid. (Ref: Hodgson C, et al. 2014)'; }
              else if (s >= 8) { risk = 'Walking with Assistance of 1 Person'; implication = 'Supervised ambulation. (Ref: Hodgson C, et al. 2014)'; }
              else if (s >= 7) { risk = 'Walking with Assistance of ≥2 People'; implication = 'Assisted ambulation. (Ref: Hodgson C, et al. 2014)'; }
              else if (s >= 6) { risk = 'Marching on the Spot'; implication = 'Pre-gait activity. (Ref: Hodgson C, et al. 2014)'; }
              else if (s >= 5) { risk = 'Transferring Bed to Chair'; implication = 'Functional transfer. (Ref: Hodgson C, et al. 2014)'; }
              else if (s >= 4) { risk = 'Standing'; implication = 'Standing with assistance. (Ref: Hodgson C, et al. 2014)'; }
              else if (s >= 3) { risk = 'Sitting Over Edge of Bed'; implication = 'Trunk control achieved. (Ref: Hodgson C, et al. 2014)'; }
              else if (s >= 2) { risk = 'Passively Moved to Chair'; implication = 'Dependent transfer. (Ref: Hodgson C, et al. 2014)'; }
              else if (s >= 1) { risk = 'Sitting in Bed Exercises'; implication = 'Minimal mobility. (Ref: Hodgson C, et al. 2014)'; }
              else { risk = 'Nothing (Lying in Bed)'; implication = 'No active mobility. (Ref: Hodgson C, et al. 2014)'; }
              break;
            case 'Gross Motor Function Measure (GMFM)':
              scoreText = `${s}%`; 
              if (s >= 80) { risk = 'High Function'; implication = 'Gross motor function appears largely preserved with ability to perform age-appropriate movement activities independently.'; }
              else if (s >= 60) { risk = 'Mild Limitation'; implication = 'Mild gross motor limitation observed with slight reduction in advanced motor skills and mobility performance.'; }
              else if (s >= 40) { risk = 'Moderate Limitation'; implication = 'Moderate gross motor impairment affecting mobility and participation in age-appropriate physical activities.'; }
              else { risk = 'Severe Limitation'; implication = 'Significant gross motor dysfunction affecting functional mobility and developmental milestones.'; }
              break;
            case 'Pediatric Balance Scale (PBS)':
              scoreText = `${s}/56`; 
              if (s >= 41) { risk = 'Low Impairment'; implication = 'Child demonstrates adequate static and dynamic balance with low risk of balance-related functional limitation.'; }
              else if (s >= 21) { risk = 'Moderate Impairment'; implication = 'Balance deficits observed during dynamic activities and may affect mobility and play participation.'; }
              else { risk = 'Severe Impairment'; implication = 'Significant balance dysfunction affecting functional mobility and safety during movement activities.'; }
              break;
            case 'Pediatric Quality of Life Inventory (PedsQL)':
              scoreText = `${s}/100`; 
              if (s >= 80) { risk = 'Good QoL'; implication = 'Child demonstrates good perceived quality of life across physical, emotional, social, and school domains.'; }
              else if (s >= 60) { risk = 'Mild Reduction'; implication = 'Mild reduction in quality of life with minor impact on functional participation.'; }
              else if (s >= 40) { risk = 'Moderate Reduction'; implication = 'Moderate impact across multiple domains affecting participation and well-being.'; }
              else { risk = 'Severe Reduction'; implication = 'Significant reduction in quality of life affecting multiple aspects of daily functioning and participation.'; }
              break;
            default: 
              scoreText = `${s}`; risk = 'Assessed'; implication = 'Detailed interpretation provided in the clinical manual.';
              break;
          }

          return { scoreText: String(scoreText), risk: String(risk), implication: String(implication) };
        };

        const getRiskColorClass = (risk) => {
          if (!risk || typeof risk !== 'string') return 'text-slate-200';
          const r = risk.toLowerCase();
          
          if (r.includes('high mobility') || r.includes('high independence') || r.includes('high function') || r.includes('capacity') || r.includes('minimal limitation') || r.includes('excellent') || r.includes('good') || r.includes('low fear') || r.includes('no functional limitation') || r.includes('mild symptoms') || r.includes('minimal disability') || r.includes('grade 0') || r.includes('grade 1') || r.includes('nothing at all') || r.includes('very very slight') || r.includes('very slight') || r.includes('no exertion') || r.includes('extremely light') || r.includes('very light') || r.includes('walking independently')) return 'text-emerald-400';
          if (r.includes('high') || r.includes('severe') || r.includes('abnormal') || r.includes('crippled') || r.includes('extreme') || r.includes('dependent') || r.includes('very hard') || r.includes('maximal') || r.includes('complete') || r.includes('household') || r.includes('bed-bound') || r.includes('poor') || r.includes('unable') || r.includes('grade 3') || r.includes('grade 4') || r.includes('extremely hard') || r.includes('hard') || r.includes('passively moved') || r.includes('sitting in bed') || r.includes('nothing (lying in bed)')) return 'text-red-400';
          if (r.includes('moderate') || r.includes('transient') || r.includes('reduced') || r.includes('variable') || r.includes('mild') || r.includes('limited') || r.includes('sensory') || r.includes('fair') || r.includes('grade 2') || r.includes('somewhat hard') || r.includes('somewhat severe') || r.includes('marching') || r.includes('transferring bed to chair') || r.includes('standing') || r.includes('sitting over edge')) return 'text-amber-400';
          if (r.includes('low') || r.includes('normal') || r.includes('independent') || r.includes('community') || r.includes('none') || r.includes('no pain') || r.includes('no disability') || r.includes('light') || r.includes('no stroke symptoms')) return 'text-emerald-400';
          
          return 'text-fuchsia-400';
        };

        // --- MAIN COMPONENT ---
        function App() {
          const [currentView, setCurrentView] = useState('dashboard');
          const [patientDetails, setPatientDetails] = useState({ id: '', age: '', gender: '', diagnosis: '', ward: '' });
          const [assessmentType, setAssessmentType] = useState('Berg Balance Scale (BBS)');

          const [validationError, setValidationError] = useState('');
          
          const [libSearchQuery, setLibSearchQuery] = useState('');
          const [selectedLibMeasure, setSelectedLibMeasure] = useState(null);

          const handleStartAssessment = (type) => {
            setAssessmentType(type);
            setGenericScore('');
            setDetailedScores({});
            setReport(null);
            setIsDropdownOpen(false);
            setSearchQuery('');
            setValidationError('');
            setCurrentView('assessment');
          };

          const handleDetailedChange = (id, val) => {
            setDetailedScores(prev => ({ ...prev, [id]: val }));
            setValidationError('');
          };

          const generateReport = () => {
            const config = detailedConfig[assessmentType];

            if (config) {
              let requiredItemCount = 0;
              let answeredItemCount = 0;

              config.sections.forEach(sec => {
                sec.items.forEach(item => {
                  requiredItemCount++;
                  if (detailedScores[item.id] !== undefined && detailedScores[item.id] !== '') {
                    answeredItemCount++;
                  }
                });
              });

              if (config.finalSelect) {
                requiredItemCount++;
                if (detailedScores['final_class'] && detailedScores['final_class'] !== '') {
                  answeredItemCount++;
                }
              }

              if (answeredItemCount < requiredItemCount) {
                setValidationError(`Please complete all fields. You have answered ${answeredItemCount} out of ${requiredItemCount} items.`);
                return; 
              }
            } else {
              if (genericScore === '' || isNaN(parseFloat(genericScore))) {
                setValidationError('Please enter a valid numerical result before calculating.');
                return; 
              }
            }

            let scoreToProcess = genericScore;

            if (config) {
              if (assessmentType === 'Infant Neurological International Battery (INFANIB)') {
                scoreToProcess = detailedScores['final_class'] || '';
              } else {
                let sum = 0;
                Object.keys(detailedScores).forEach(k => { 
                    if (k !== 'final_class') {
                        const val = detailedScores[k];
                        if (val !== undefined && val !== '' && val !== '0_UN') {
                            sum += parseFloat(val) || 0;
                        }
                    }
                });
                
                if (assessmentType === 'Oswestry Disability Index (ODI)' || assessmentType === 'Neck Disability Index (NDI)') {
                  scoreToProcess = ((sum / 50) * 100).toFixed(1);
                } else if (assessmentType === 'Western Ontario and McMaster Universities Osteoarthritis Index (WOMAC)') {
                   scoreToProcess = sum;
                } else if (assessmentType === 'Patient Specific Functional Scale (PSFS)') {
                   let count = Object.keys(detailedScores).filter(k => k !== 'final_class' && k.startsWith('psfs_')).length;
                   scoreToProcess = count > 0 ? (sum / count).toFixed(1) : 0;
                } else if (assessmentType === 'Disabilities of the Arm, Shoulder and Hand (DASH)') {
                   let count = 0;
                   let localSum = 0;
                   Object.keys(detailedScores).forEach(k => { 
                       if (k !== 'final_class' && k.startsWith('dash_')) {
                           localSum += parseFloat(detailedScores[k] || 0);
                           count++;
                       }
                   });
                   scoreToProcess = count > 0 ? (((localSum / count) - 1) * 25).toFixed(1) : 0;
                } else if (assessmentType === 'Knee Injury and Osteoarthritis Outcome Score (KOOS)') {
                   let symSum = 0, painSum = 0, adlSum = 0, sportSum = 0, qolSum = 0;
                   Object.keys(detailedScores).forEach(k => {
                     const v = parseFloat(detailedScores[k] || 0);
                     if (k.startsWith('koos_s')) symSum += v;
                     if (k.startsWith('koos_p')) painSum += v;
                     if (k.startsWith('koos_a')) adlSum += v;
                     if (k.startsWith('koos_sp')) sportSum += v;
                     if (k.startsWith('koos_q')) qolSum += v;
                   });
                   const symScore = 100 - (symSum * 100 / 28);
                   const painScore = 100 - (painSum * 100 / 36);
                   const adlScore = 100 - (adlSum * 100 / 68);
                   const sportScore = 100 - (sportSum * 100 / 20);
                   const qolScore = 100 - (qolSum * 100 / 16);
                   
                   scoreToProcess = ((symScore + painScore + adlScore + sportScore + qolScore) / 5).toFixed(1);
                } else if (assessmentType === 'Pediatric Quality of Life Inventory (PedsQL)') {
                   let pSum = 0, count = 0;
                   Object.keys(detailedScores).forEach(k => {
                     const v = detailedScores[k];
                     pSum += (v === 0 ? 100 : v === 1 ? 75 : v === 2 ? 50 : v === 3 ? 25 : 0);
                     count++;
                   });
                   scoreToProcess = count > 0 ? (pSum / count).toFixed(1) : 0;
                } else if (assessmentType === 'Gross Motor Function Measure (GMFM)') {
                   scoreToProcess = ((sum / 42) * 100).toFixed(1);
                } else if (assessmentType === 'Fear Avoidance Beliefs Questionnaire (FABQ)') {
                   let pa = 0, w = 0;
                   Object.keys(detailedScores).forEach(k => { 
                     if (k.startsWith('fabq_pa_')) pa += (detailedScores[k] || 0);
                     if (k.startsWith('fabq_w_')) w += (detailedScores[k] || 0);
                   });
                   scoreToProcess = `${pa},${w}`;
                } else {
                  scoreToProcess = sum;
                }
              }
            }

            const result = getInterpretation(assessmentType, scoreToProcess);
            if (result) setReport({ type: assessmentType, ...result });
          };

          const renderAssessment = () => {

            ];
            const filtered = cats.map(c => ({ ...c, i: c.i.filter(x => x.toLowerCase().includes(searchQuery.toLowerCase())) })).filter(c => c.i.length > 0);

            let categoryIcon = 'fa-notes-medical';
            if (Object.keys(neurologyMeasuresData).includes(assessmentType)) categoryIcon = 'fa-brain';
            else if (Object.keys(mskMeasuresData).includes(assessmentType)) categoryIcon = 'fa-bone';
            else if (Object.keys(cardioMeasuresData).includes(assessmentType)) categoryIcon = 'fa-heart-pulse';
            else if (Object.keys(paediatricMeasuresData).includes(assessmentType)) categoryIcon = 'fa-child-reaching';

            let requiredItemCount = 0;
            let answeredItemCount = 0;
            if (config) {
              config.sections.forEach(sec => {
                sec.items.forEach(item => {
                  requiredItemCount++;
                  if (detailedScores[item.id] !== undefined && detailedScores[item.id] !== '') answeredItemCount++;
                });
              });
              if (config.finalSelect) {
                requiredItemCount++;
                if (detailedScores['final_class'] && detailedScores['final_class'] !== '') answeredItemCount++;
              }
            }
            const progressPercent = requiredItemCount > 0 ? Math.round((answeredItemCount / requiredItemCount) * 100) : 0;

            return (
              <div className="space-y-8 pb-24 max-w-7xl mx-auto animate-fade-in">
                
                <div className="bg-slate-900 p-6 rounded-3xl shadow-[0_8px_30px_rgb(0,0,0,0.2)] border border-slate-800 flex flex-col lg:flex-row justify-between items-center gap-6 relative z-20">

                    <div onClick={() => setIsDropdownOpen(!isDropdownOpen)} className="bg-slate-800 border border-slate-700 text-slate-100 font-bold py-4 px-5 rounded-2xl cursor-pointer flex justify-between items-center hover:bg-slate-700 hover:border-slate-600 transition-all shadow-sm group">
                      <span className="truncate group-hover:text-white transition-colors">{String(assessmentType)}</span>
                      <ChevronRight className={`transform transition-transform text-slate-400 group-hover:text-fuchsia-400 ${isDropdownOpen ? 'rotate-90' : ''}`} size={18} />
                    </div>
                    
                    {isDropdownOpen && (
                      <><div className="fixed inset-0 z-40 bg-slate-950/40 backdrop-blur-sm transition-opacity" onClick={() => setIsDropdownOpen(false)}></div>
                      <div className="absolute left-0 right-0 lg:left-auto lg:right-0 top-full mt-3 w-full lg:w-[480px] bg-slate-800 border border-slate-700 rounded-3xl shadow-[0_20px_60px_-15px_rgba(0,0,0,0.5)] z-50 flex flex-col overflow-hidden animate-slide-up">
                        <div className="p-4 border-b border-slate-700 bg-slate-800/80 backdrop-blur-md">
                          <div className="relative">
                            <Search className="absolute left-4 top-1/2 -translate-y-1/2 text-slate-400" size={16} />
                            <input type="text" className="w-full pl-11 pr-4 py-3 bg-slate-900 border border-slate-700 rounded-xl text-sm focus:outline-none focus:ring-2 focus:ring-fuchsia-500/50 focus:border-fuchsia-500 font-bold text-white shadow-sm transition-shadow placeholder-slate-500" placeholder="Search assessments..." value={searchQuery} onChange={e => setSearchQuery(e.target.value)} autoFocus />
                          </div>
                        </div>
                        <div className="overflow-y-auto max-h-[60vh] p-3 custom-scrollbar">
                          {filtered.map(c => (

                                    {String(item)}

                </div>

                {evidence && (

                <div className="bg-slate-900 p-6 sm:p-8 rounded-3xl shadow-[0_8px_30px_rgb(0,0,0,0.2)] border border-slate-800 grid grid-cols-1 sm:grid-cols-2 xl:grid-cols-4 gap-6 relative overflow-hidden">

                                </div>
                            </button>

                                    </div>
                                    <div className="flex items-start gap-3">
                                        <div className="bg-amber-900/30 border border-amber-800/50 text-amber-400 p-2.5 rounded-full shrink-0 mt-0.5"><Users size={16} /></div>
                                        <div><h5 className="font-bold text-slate-200 text-sm mb-1">Patient-Centered</h5><p className="text-xs text-slate-400 leading-relaxed">Better insights lead to better care.</p></div>
                                    </div>
                                </div>
                             </div>
                        </div>

                        <div className="lg:col-span-4 flex flex-col">
                            {/* Standardized Promo Panel */}
                            <div className="bg-indigo-950/50 border border-indigo-900 rounded-[2rem] p-8 relative overflow-hidden flex items-center h-full group">

                                    <h4 className="font-black text-indigo-100 mb-2 text-base">Standardized. Reliable. Efficient.</h4>

                                <div className="absolute right-6 z-10 bg-indigo-600 text-white rounded-full w-12 h-12 flex items-center justify-center shadow-lg transform group-hover:rotate-12 transition-transform">
                                    <i className="fa-solid fa-check text-xl"></i>
                                </div>
                            </div>
                        </div>
                    </div>

                  </div>
                ) : currentView === 'assessment' ? renderAssessment() : currentView === 'library' ? renderLibrary() : renderReport()}

                        <a href="mailto:kamaruddin.w@moh.gov.my" className="inline-flex items-center text-violet-400 hover:text-fuchsia-300 transition font-bold bg-slate-800 border border-slate-700 px-3 py-1.5 rounded-full text-[11px]">

                            <p className="text-[10px] text-slate-500">Empowering physiotherapists. Enhancing outcomes.</p>
                        </div>
                    </div>
                </div>
              </footer>

            </div>
          );
        }

        const rootElement = document.getElementById('root');
        if (rootElement) {
          const root = ReactDOM.createRoot(rootElement);
          root.render(<App />);
        }
    </script>
    <style>

      .animate-fade-in-up { animation: fadeInUp 0.4s ease-out forwards; }

      .line-clamp-3 { display: -webkit-box; -webkit-line-clamp: 3; -webkit-box-orient: vertical; overflow: hidden; }
